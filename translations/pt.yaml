---
configuration:
  # Seção de Configuração JK-BMS
  jkbms_path:
    name: "🟪 JK-BMS → Caminho da Porta Serial"
    description: "Caminho para a porta serial onde o JK-BMS está conectado (Menu: Configurações-Hardware-Todo o hardware)."
    
  jkbms_count:
    name: "🟪 JK-BMS → Número de Módulos BMS"
    description: "Número de módulos JK-BMS a consultar. Eles devem estar conectados ao barramento RS485 (valor: 1 a 15)."
    
  use_gateway:
    name: "🟨 JK-BMS → Usar Gateway TCP"
    description: "Habilitar a comunicação via gateway IP (Gateway TCP) em vez da porta serial local."
    
  gateway_ip_port:
    name: "🟨 JK-BMS → Endereço IP do Gateway + Porta"
    description: "Endereço IP + porta do gateway de rede para acesso remoto ao JK-BMS (ex: 192.168.1.100:5000)."
    
  communication_debug:
    name: "🔴 JK-BMS → Depuração de Comunicação"
    description: "Ativar a exibição detalhada dos logs de comunicação (para diagnóstico ou suporte)."
    
  bms_broadcasting:
    name: "🔴 JK-BMS → Transmissão BMS (Broadcasting)"
    description: "Neste modo, o BMS publica os dados agregados por conta própria. Deve estar configurado como Master (chave em 0000)."

  non_broadcasting_data_interval_s:
    name: "⏱️ JK-BMS → Intervalo de dados sem transmissão (s)"
    description: "Atraso entre cada ciclo de consulta de dados quando o modo de transmissão (broadcasting) está desativado. Intervalo permitido: 1 a 30 segundos."
    
  CAN_bus_usage:
    name: "🔴 JK-BMS → Uso do Barramento CAN"
    description: "Habilitar a comunicação e transmissão de dados no barramento CAN (se conectado fisicamente)."

  # Seção de Configuração MQTT
  mqttadresse_port: 
    name: "🚩 MQTT → Endereço do Broker + Porta"
    description: "Endereço do broker MQTT + porta (ex: core-mosquitto.local.hass.io:1883 ou IP local + porta)."
    
  mqttuser:
    name: "🚩 MQTT → Nome de Usuário"
    description: "Nome de usuário para conectar ao broker MQTT."
    
  mqttpass:
    name: "🚩 MQTT → Senha"
    description: "Senha associada ao usuário MQTT."

  Send_bip:
    name: "📊 Uso do Add-on"
    description: "Ativar um sinal sonoro (bipe) na inicialização. Nenhum dado privado é transmitido. O processamento está em conformidade com o RGPD."

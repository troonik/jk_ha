---
configuration:
  # JK-BMS Konfigurationsabschnitt
  jkbms_path:
    name: "🟪 JK-BMS → Serieller Pfad"
    description: "Pfad zur seriellen Schnittstelle, an der das JK-BMS angeschlossen ist (Menü: Einstellungen-Hardware-Alle Hardware)."
    
  jkbms_count:
    name: "🟪 JK-BMS → Anzahl der BMS-Module"
    description: "Anzahl der abzufragenden JK-BMS-Module. Diese müssen am RS485-Bus angeschlossen sein (Wert: 1 bis 15)."
    
  use_gateway:
    name: "🟨 JK-BMS → TCP-Gateway verwenden"
    description: "Ermöglicht die Kommunikation über ein IP-Gateway (TCP-Gateway) anstelle der lokalen seriellen Schnittstelle."
    
  gateway_ip_port:
    name: "🟨 JK-BMS → Gateway IP-Adresse + Port"
    description: "IP-Adresse + Netzwerk-Gateway-Port für den Fernzugriff auf das JK-BMS (z. B. 192.168.1.100:5000)."
    
  communication_debug:
    name: "🔴 JK-BMS → Kommunikations-Debug"
    description: "Detaillierte Anzeige von Kommunikationsprotokollen aktivieren (für Diagnose oder Support)."
    
  bms_broadcasting:
    name: "🔴 JK-BMS → BMS-Broadcasting"
    description: "In diesem Modus veröffentlicht das BMS aggregierte Daten selbstständig. Es muss als Master konfiguriert sein (Schalter auf 0000)."

  non_broadcasting_data_interval_s:
    name: "⏱️ JK-BMS → Abfrageintervall ohne Broadcasting (s)"
    description: "Verzögerung zwischen den einzelnen Datenabfragezyklen, wenn der BMS-Broadcasting-Modus deaktiviert ist. Zulässiger Bereich: 1 bis 30 Sekunden."
    
  CAN_bus_usage:
    name: "🔴 JK-BMS → CAN-Bus Nutzung"
    description: "Aktiviert die Kommunikation und Datenübertragung auf dem CAN-Bus (falls physisch verbunden)."

  # MQTT Konfigurationsabschnitt
  mqttadresse_port: 
    name: "🚩 MQTT → Broker-Adresse + Port"
    description: "MQTT-Broker-Adresse + Port (z. B. core-mosquitto.local.hass.io:1883 oder lokale IP + Port)."
    
  mqttuser:
    name: "🚩 MQTT → Benutzername"
    description: "Benutzername für die Verbindung zum MQTT-Broker."
    
  mqttpass:
    name: "🚩 MQTT → Passwort"
    description: "Passwort für den entsprechenden MQTT-Benutzer."

  Send_bip:
    name: "📊 Add-on Nutzung"
    description: "Aktiviert einen Signalton beim Start. Es werden keine privaten Daten übertragen. Die Verarbeitung erfolgt gemäß DSGVO."
